llm_backend:
  type: openai-compatible
  base_url: http://localhost:11434/v1
  api_key: ollama
  _comment: Change base_url for LM Studio (1234), llama.cpp (8080), vLLM (8000), Jan
    (1337)
model_mapping:
  best: qwen2.5-coder:32b
  mid: qwen2.5-coder:14b
  fast: qwen2.5-coder:7b
  _comment: Map agent model tiers to your installed local models
  _alternatives:
    deepseek:
      best: deepseek-coder-v2:33b
      mid: deepseek-coder-v2:16b
      fast: deepseek-coder:6.7b
    codellama:
      best: codellama:70b
      mid: codellama:13b
      fast: codellama:7b
    mistral:
      best: mistral:7b
      mid: mistral:7b
      fast: mistral:7b
tool_mapping:
  file_read: Read local files
  file_write: Write local files
  file_edit: Edit local files
  shell_exec: Run shell commands
  search: Grep/ripgrep file content
  file_search: Glob file patterns
  task_tracker: Track tasks (markdown todo list)
  ask_user: Ask user for clarification
  spawn_subagent: Not available in most local setups - handle sequentially
defaults:
  temperature: 0.2
  max_tokens: 4096
  timeout_seconds: 120
